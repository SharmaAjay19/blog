<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic — Intelligence for Builders</title>
  <meta name="description" content="Deep technical writing on agentic AI, architecture, and the engineering of reliable intelligent systems.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Lora:ital,wght@0,400..700;1,400..700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <!-- Syntax highlighting theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080808;
      --surface:   #0e0e10;
      --surface2:  #141416;
      --bd:        #1c1c20;
      --bd2:       #2a2a30;
      --tx:        #deded8;
      --tx2:       #7e7e7a;
      --tx3:       #3a3a38;
      --acc:       #b8f050;
      --acc-dim:   rgba(184,240,80,.07);
      --acc-bd:    rgba(184,240,80,.18);
      --acc-tx:    #86b030;
      --f-disp:    'Fraunces', Georgia, serif;
      --f-body:    'Lora', Georgia, serif;
      --f-ui:      'DM Mono', 'Courier New', monospace;
      --max:       740px;
      --wide:      1100px;
      --r:         3px;
      --ease:      cubic-bezier(.4,0,.2,1);
    }

    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--tx);
      font-family: var(--f-ui);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Reading progress bar ─────────────────────────────────────── */
    #progress {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: var(--acc);
      z-index: 200;
      transition: width .08s linear;
      display: none;
    }

    /* ── Navigation ───────────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,8,.93);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--bd);
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
    }
    .nav-logo {
      font-family: var(--f-disp);
      font-weight: 800; font-size: 1.05rem;
      letter-spacing: -.025em; color: var(--tx);
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center;
    }
    .blink {
      display: inline-block; width: 2px; height: 1em;
      background: var(--acc); margin-left: 1px;
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .nav-links { display: flex; align-items: center; gap: 1.5rem; }
    .nav-link {
      font-family: var(--f-ui); font-size: .68rem;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--tx2); text-decoration: none;
      cursor: pointer; transition: color .15s;
    }
    .nav-link:hover { color: var(--tx); }

    main { min-height: calc(100vh - 52px - 58px); }

    /* ── Footer ───────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--bd);
      padding: 1.5rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-brand {
      font-family: var(--f-disp); font-weight: 700; font-size: .9rem;
      letter-spacing: -.02em; color: var(--tx3);
    }
    .footer-copy {
      font-size: .65rem; letter-spacing: .06em; color: var(--tx3);
    }

    /* ── Page transitions ─────────────────────────────────────────── */
    .appear {
      animation: appear .28s var(--ease) both;
    }
    @keyframes appear {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════════════════════
       HOME PAGE
    ═══════════════════════════════════════════════════════════════ */

    /* Hero header */
    .hero {
      border-bottom: 1px solid var(--bd);
      padding: 5.5rem 2rem 4rem;
      position: relative; overflow: hidden;
    }
    /* Dot-grid texture */
    .hero::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(184,240,80,.055) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    /* Gradient fade from left */
    .hero::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(90deg, rgba(8,8,8,.6) 0%, transparent 60%);
    }
    .hero-inner {
      max-width: var(--wide); margin: 0 auto;
      position: relative; z-index: 1;
    }
    .hero-kicker {
      font-family: var(--f-ui); font-size: .62rem;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--acc); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .hero-kicker::before {
      content: ''; display: inline-block;
      width: 18px; height: 1px; background: var(--acc);
    }
    .masthead {
      font-family: var(--f-disp);
      font-size: clamp(4rem, 11vw, 8.5rem);
      font-weight: 900; letter-spacing: -.04em;
      line-height: .9; color: var(--tx);
      margin-bottom: 1.75rem;
    }
    .masthead-cursor {
      display: inline-block; width: .07em; height: .85em;
      background: var(--acc); margin-left: .03em;
      animation: blink 1.1s step-end infinite;
      vertical-align: -.03em;
    }
    .hero-tagline {
      font-family: var(--f-body); font-style: italic;
      font-size: 1.05rem; color: var(--tx2);
      line-height: 1.65; max-width: 440px; margin-bottom: 2.5rem;
    }
    .hero-meta {
      display: flex; align-items: center; gap: 1.5rem;
      flex-wrap: wrap; font-size: .68rem; color: var(--tx3);
    }
    .hero-meta .em { color: var(--tx2); }
    .hero-meta-sep { color: var(--bd2); }

    /* Articles section */
    .articles-wrap {
      max-width: var(--wide); margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }
    .section-label {
      font-size: .62rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--tx3); margin-bottom: 2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--bd);
    }

    /* Featured card */
    .featured {
      border: 1px solid var(--bd); border-radius: var(--r);
      padding: 2.5rem 2.75rem;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color .2s, background .2s;
      margin-bottom: 1px;
    }
    .featured::before {
      content: ''; position: absolute;
      top: 0; left: 0; width: 3px; height: 100%;
      background: var(--acc);
      transform: scaleY(0); transform-origin: bottom;
      transition: transform .28s var(--ease);
    }
    .featured:hover { border-color: var(--bd2); background: var(--surface); }
    .featured:hover::before { transform: scaleY(1); }

    .card-eyebrow {
      font-size: .62rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--acc); margin-bottom: 1.1rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .card-eyebrow::before { content: '★'; font-size: .55rem; }

    .featured-title {
      font-family: var(--f-disp);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700; letter-spacing: -.03em; line-height: 1.08;
      color: var(--tx); margin-bottom: .7rem;
    }
    .featured-sub {
      font-family: var(--f-body); font-style: italic;
      font-size: .98rem; color: var(--tx2);
      line-height: 1.6; max-width: 580px; margin-bottom: 1.75rem;
    }
    .card-foot {
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap;
    }
    .card-date { font-size: .68rem; color: var(--tx3); }
    .tags { display: flex; gap: .4rem; flex-wrap: wrap; }
    .tag {
      font-size: .6rem; letter-spacing: .05em;
      padding: .2em .65em;
      border: 1px solid var(--acc-bd); border-radius: 2px;
      color: var(--acc-tx); background: var(--acc-dim);
    }
    .read-time {
      font-size: .68rem; color: var(--tx3); margin-left: auto;
    }
    .read-arrow {
      font-size: .68rem; color: var(--acc); margin-left: .25rem;
    }

    /* Article grid (for non-featured articles) */
    .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
      background: var(--bd);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      overflow: hidden; gap: 1px;
      margin-top: 2rem;
    }
    .article-card {
      background: var(--bg); padding: 1.75rem 2rem;
      cursor: pointer; transition: background .15s;
      position: relative;
    }
    .article-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; width: 3px; height: 100%;
      background: var(--acc);
      transform: scaleY(0); transform-origin: bottom;
      transition: transform .22s var(--ease);
    }
    .article-card:hover { background: var(--surface); }
    .article-card:hover::before { transform: scaleY(1); }
    .article-card-title {
      font-family: var(--f-disp); font-weight: 600; font-size: 1.1rem;
      letter-spacing: -.02em; line-height: 1.2;
      color: var(--tx); margin-bottom: .45rem;
    }
    .article-card-sub {
      font-family: var(--f-body); font-style: italic;
      font-size: .85rem; color: var(--tx2);
      line-height: 1.5; margin-bottom: 1rem;
    }

    /* ═══════════════════════════════════════════════════════════════
       ARTICLE PAGE
    ═══════════════════════════════════════════════════════════════ */

    .article-back-bar {
      max-width: var(--max); margin: 0 auto;
      padding: 1.5rem 2rem 0;
    }
    .back-btn {
      font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
      color: var(--tx3); cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: .45rem;
      transition: color .15s; border: none; background: none;
    }
    .back-btn::before { content: '←'; }
    .back-btn:hover { color: var(--tx2); }

    .article-hd {
      max-width: var(--max); margin: 0 auto;
      padding: 2.5rem 2rem 2.25rem;
      border-bottom: 1px solid var(--bd);
    }
    .article-tags { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .article-title {
      font-family: var(--f-disp);
      font-size: clamp(2rem, 5.5vw, 3.25rem);
      font-weight: 800; letter-spacing: -.035em; line-height: 1.04;
      color: var(--tx); margin-bottom: .9rem;
    }
    .article-subtitle {
      font-family: var(--f-body); font-style: italic;
      font-size: 1.1rem; color: var(--tx2);
      line-height: 1.65; margin-bottom: 1.5rem;
    }
    .article-byline {
      display: flex; align-items: center; gap: .9rem;
      font-size: .68rem; color: var(--tx3); flex-wrap: wrap;
    }
    .byline-sep { color: var(--bd2); }

    /* ── Article body typography ───────────────────────────────────── */
    .article-body {
      max-width: var(--max); margin: 0 auto;
      padding: 3rem 2rem 6rem;
      font-family: var(--f-body); font-size: 1.05rem;
      line-height: 1.82; color: var(--tx);
    }

    /* Headings */
    .article-body h1,
    .article-body h2,
    .article-body h3,
    .article-body h4 {
      font-family: var(--f-disp);
      color: var(--tx); letter-spacing: -.025em;
    }
    .article-body h1 {
      font-size: 2rem; font-weight: 800; line-height: 1.1;
      margin: 3rem 0 1rem;
    }
    .article-body h2 {
      font-size: 1.45rem; font-weight: 700; line-height: 1.2;
      margin: 3rem 0 1rem;
      padding-bottom: .6rem;
      border-bottom: 1px solid var(--bd);
    }
    .article-body h3 {
      font-size: 1.1rem; font-weight: 700; line-height: 1.3;
      margin: 2.25rem 0 .6rem;
    }
    .article-body h4 {
      font-size: .95rem; font-weight: 600;
      color: var(--tx2); margin: 1.75rem 0 .5rem;
    }

    /* First heading in document */
    .article-body > h1:first-child,
    .article-body > h2:first-child { margin-top: 0; }

    /* Body text */
    .article-body p { margin-bottom: 1.5rem; }
    .article-body p:last-child { margin-bottom: 0; }
    .article-body strong { font-weight: 700; color: var(--tx); }
    .article-body em { font-style: italic; }

    /* Links */
    .article-body a {
      color: var(--acc-tx); text-decoration: underline;
      text-decoration-color: var(--acc-bd);
      text-underline-offset: 3px; transition: color .15s;
    }
    .article-body a:hover { color: var(--acc); }

    /* Lists */
    .article-body ul, .article-body ol {
      padding-left: 1.6rem; margin-bottom: 1.5rem;
    }
    .article-body li { margin-bottom: .5rem; }
    .article-body li::marker { color: var(--acc-tx); }

    /* Blockquotes (insight callouts) */
    .article-body blockquote {
      position: relative;
      margin: 2rem 0;
      padding: .9rem 1.5rem .9rem 1.75rem;
      background: var(--surface);
      border-left: 2px solid var(--acc);
      border-radius: 0 var(--r) var(--r) 0;
    }
    .article-body blockquote p {
      font-family: var(--f-body); font-style: italic;
      color: var(--tx2); margin-bottom: 0; font-size: .98rem;
      line-height: 1.7;
    }
    .article-body blockquote strong { color: var(--acc-tx); }

    /* Inline code */
    .article-body :not(pre) > code {
      font-family: 'DM Mono', monospace; font-size: .85em;
      background: var(--surface2);
      padding: .15em .4em; border-radius: 3px;
      color: #c8e890; letter-spacing: -.01em;
    }

    /* Code blocks */
    .article-body pre {
      background: #0d1117;
      border: 1px solid var(--bd);
      border-radius: 5px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto; margin: 1.75rem 0;
      position: relative;
    }
    .article-body pre code {
      background: none; padding: 0;
      font-size: .82rem; line-height: 1.65;
      font-family: 'DM Mono', monospace;
      color: #adbac7; /* github-dark-dimmed base */
    }

    /* Tables */
    .article-body table {
      width: 100%; border-collapse: collapse;
      margin: 2rem 0; font-family: var(--f-ui);
      font-size: .78rem; line-height: 1.5;
      overflow-x: auto; display: block;
    }
    .article-body thead tr {
      border-bottom: 2px solid var(--bd2);
    }
    .article-body th {
      text-align: left; padding: .55rem .875rem;
      color: var(--tx2); letter-spacing: .05em;
      font-weight: 500; white-space: nowrap;
    }
    .article-body td {
      padding: .55rem .875rem;
      border-bottom: 1px solid var(--bd);
      vertical-align: top; color: var(--tx);
    }
    .article-body tr:last-child td { border-bottom: none; }
    .article-body tbody tr:hover td { background: var(--surface); }

    /* Horizontal rule */
    .article-body hr {
      border: none; border-top: 1px solid var(--bd);
      margin: 2.5rem 0;
    }

    /* ── Loading state ─────────────────────────────────────────────── */
    .loading {
      display: flex; align-items: center; gap: .75rem;
      padding: 3rem 2rem; max-width: var(--max); margin: 0 auto;
      font-size: .72rem; letter-spacing: .08em; color: var(--tx3);
    }
    .loading-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--acc); opacity: .7;
      animation: pulse .9s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: .15s; }
    .loading-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes pulse {
      0%,100% { opacity: .2; transform: scale(.8); }
      50%      { opacity: 1;  transform: scale(1); }
    }

    /* ── Error state ───────────────────────────────────────────────── */
    .error-msg {
      max-width: var(--max); margin: 3rem auto;
      padding: 1.5rem 2rem;
      border: 1px solid var(--bd); border-left: 2px solid #f05050;
      border-radius: 0 var(--r) var(--r) 0;
      font-size: .82rem; line-height: 1.6; color: var(--tx2);
      background: var(--surface);
    }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .hero { padding: 3.5rem 1rem 2.75rem; }
      .articles-wrap { padding: 2rem 1rem 4rem; }
      .featured { padding: 1.5rem; }
      .article-back-bar { padding: 1rem 1rem 0; }
      .article-hd { padding: 1.75rem 1rem 1.75rem; }
      .article-body { padding: 2rem 1rem 4rem; font-size: 1rem; }
      .read-time { display: none; }
      footer { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>

<div id="progress"></div>

<nav>
  <a class="nav-logo" onclick="goHome()" role="link" tabindex="0">Agentic<span class="blink"></span></a>
  <div class="nav-links">
    <a class="nav-link" onclick="goHome()">All Articles</a>
  </div>
</nav>

<main id="app"></main>

<footer>
  <span class="footer-brand">Agentic</span>
  <span class="footer-copy">Deep technical writing on agentic AI architecture</span>
</footer>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
"use strict";

/* ════════════════════════════════════════════════════════════════════
   ARTICLE MANIFEST
   Add new articles by appending an object to this array.
   `file` is relative to the location of index.html on GitHub Pages.
════════════════════════════════════════════════════════════════════ */
const ARTICLES = [
  {
    file:     'agentic_context_engineering.md',
    title:    "The RAM Doesn't Lie",
    subtitle: 'Engineering Context as the Primary Lever for Reliable AI Agents',
    date:     '2026-03-22',
    tags:     ['Context Engineering', 'Architecture', 'Multi-Agent'],
    featured: true,
    readTime: '18 min read'
  }
  /* Example of adding a future article:
  ,{
    file:     'another-article.md',
    title:    'Another Article Title',
    subtitle: 'A subtitle describing the article',
    date:     '2026-04-10',
    tags:     ['LLM', 'Production'],
    featured: false,
    readTime: null   // will be auto-calculated
  }
  */
];

/* ════════════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════════════ */

function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00Z');
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function estimateReadTime(text) {
  const words = text.trim().split(/\s+/).length;
  const mins  = Math.max(1, Math.round(words / 220));
  return mins + ' min read';
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tagsHTML(tags) {
  return (tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
}

/* ════════════════════════════════════════════════════════════════════
   MARKED — configure renderer with syntax highlighting
════════════════════════════════════════════════════════════════════ */

function configureMarked() {
  const renderer = new marked.Renderer();

  renderer.code = function(code, lang) {
    const language = (lang && hljs.getLanguage(lang)) ? lang : 'plaintext';
    let highlighted;
    try {
      highlighted = hljs.highlight(
        typeof code === 'object' ? code.text : code,
        { language, ignoreIllegals: true }
      ).value;
    } catch (e) {
      highlighted = esc(typeof code === 'object' ? code.text : code);
    }
    return `<pre><code class="hljs language-${esc(language)}">${highlighted}</code></pre>`;
  };

  // Open external links in new tab
  renderer.link = function(href, title, text) {
    const h = typeof href === 'object' ? href.href : href;
    const t = typeof href === 'object' ? href.title : title;
    const isExt = h && (h.startsWith('http://') || h.startsWith('https://'));
    const attrs = isExt ? ' target="_blank" rel="noopener noreferrer"' : '';
    return `<a href="${esc(h || '')}"${t ? ` title="${esc(t)}"` : ''}${attrs}>${text}</a>`;
  };

  marked.use({ renderer, gfm: true, breaks: false });
}

/* ════════════════════════════════════════════════════════════════════
   READING PROGRESS
════════════════════════════════════════════════════════════════════ */

let progressOn = false;

function startProgress() {
  document.getElementById('progress').style.display = 'block';
  progressOn = true;
  tickProgress();
}

function stopProgress() {
  progressOn = false;
  const bar = document.getElementById('progress');
  bar.style.display = 'none';
  bar.style.width    = '0%';
}

function tickProgress() {
  if (!progressOn) return;
  const scrollTop    = document.documentElement.scrollTop || document.body.scrollTop;
  const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const pct = scrollHeight > 0 ? Math.min(100, (scrollTop / scrollHeight) * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

window.addEventListener('scroll', tickProgress, { passive: true });

/* ════════════════════════════════════════════════════════════════════
   ROUTER
════════════════════════════════════════════════════════════════════ */

function getRoute() {
  const h = window.location.hash;
  if (h.startsWith('#read=')) {
    return { page: 'article', file: decodeURIComponent(h.slice(6)) };
  }
  return { page: 'home' };
}

function route() {
  const r = getRoute();
  if (r.page === 'article') renderArticle(r.file);
  else                       renderHome();
  window.scrollTo(0, 0);
}

function goHome() {
  stopProgress();
  history.pushState('', document.title, window.location.pathname + window.location.search);
  renderHome();
  window.scrollTo(0, 0);
}

function goArticle(file) {
  window.location.hash = '#read=' + encodeURIComponent(file);
}

/* ════════════════════════════════════════════════════════════════════
   HOME
════════════════════════════════════════════════════════════════════ */

function renderHome() {
  stopProgress();
  document.title = 'Agentic — Intelligence for Builders';

  const featured = ARTICLES.find(a => a.featured) || ARTICLES[0];
  const rest      = ARTICLES.filter(a => a !== featured);

  const featuredCard = featured ? `
    <div class="featured" onclick="goArticle('${esc(featured.file)}')" role="article" tabindex="0"
         onkeydown="if(event.key==='Enter') goArticle('${esc(featured.file)}')">
      <div class="card-eyebrow">Featured</div>
      <div class="featured-title">${esc(featured.title)}</div>
      <div class="featured-sub">${esc(featured.subtitle)}</div>
      <div class="card-foot">
        <span class="card-date">${fmtDate(featured.date)}</span>
        <div class="tags">${tagsHTML(featured.tags)}</div>
        <span class="read-time">${featured.readTime || '18 min read'}<span class="read-arrow"> →</span></span>
      </div>
    </div>` : '';

  const gridCards = rest.map(a => `
    <div class="article-card" onclick="goArticle('${esc(a.file)}')" role="article" tabindex="0"
         onkeydown="if(event.key==='Enter') goArticle('${esc(a.file)}')">
      <div class="article-card-title">${esc(a.title)}</div>
      <div class="article-card-sub">${esc(a.subtitle)}</div>
      <div class="card-foot">
        <span class="card-date">${fmtDate(a.date)}</span>
        <div class="tags">${tagsHTML(a.tags)}</div>
      </div>
    </div>`).join('');

  const grid = rest.length ? `
    <div class="section-label" style="margin-top:3rem">More Articles</div>
    <div class="article-grid">${gridCards}</div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="appear">
      <div class="hero">
        <div class="hero-inner">
          <div class="hero-kicker">Journal of Agentic Systems · Vol.&thinsp;1</div>
          <h1 class="masthead">Agentic<span class="masthead-cursor"></span></h1>
          <p class="hero-tagline">Deep technical writing on agentic AI, architecture, and the engineering of reliable intelligent systems.</p>
          <div class="hero-meta">
            Issue&nbsp;<span class="em">001</span>
            <span class="hero-meta-sep">·</span>
            <span class="em">March 2026</span>
            <span class="hero-meta-sep">·</span>
            <span class="em">${ARTICLES.length}&nbsp;article${ARTICLES.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
      </div>

      <div class="articles-wrap">
        <div class="section-label">Latest Issue</div>
        ${featuredCard}
        ${grid}
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════════════════════════
   ARTICLE
════════════════════════════════════════════════════════════════════ */

async function renderArticle(file) {
  const app  = document.getElementById('app');
  const meta = ARTICLES.find(a => a.file === file);

  // Loading skeleton
  app.innerHTML = `
    <div class="appear">
      <div class="article-back-bar">
        <button class="back-btn" onclick="goHome()">All Articles</button>
      </div>
      <div class="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <span>Loading article</span>
      </div>
    </div>`;

  let raw;
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    raw = await res.text();
  } catch (err) {
    app.innerHTML = `
      <div class="appear">
        <div class="article-back-bar">
          <button class="back-btn" onclick="goHome()">All Articles</button>
        </div>
        <div class="error-msg">
          <strong>Could not load article.</strong><br>
          Make sure <code>${esc(file)}</code> exists in the same directory as <code>index.html</code>.<br><br>
          <span style="color:var(--tx3)">Error: ${esc(err.message)}</span>
        </div>
      </div>`;
    return;
  }

  // Parse + render
  const readTime = (meta && meta.readTime) || estimateReadTime(raw);
  const title    = (meta && meta.title)    || file;
  const subtitle = (meta && meta.subtitle) || '';
  const date     = (meta && meta.date)     ? fmtDate(meta.date) : '';
  const tags     = (meta && meta.tags)     || [];

  document.title = `${title} — Agentic`;

  let bodyHTML;
  try {
    bodyHTML = marked.parse(raw);
  } catch (e) {
    bodyHTML = `<p>Failed to parse markdown: ${esc(e.message)}</p>`;
  }

  app.innerHTML = `
    <div class="appear">
      <div class="article-back-bar">
        <button class="back-btn" onclick="goHome()">All Articles</button>
      </div>

      <div class="article-hd">
        ${tags.length ? `<div class="article-tags">${tagsHTML(tags)}</div>` : ''}
        <h1 class="article-title">${esc(title)}</h1>
        ${subtitle ? `<p class="article-subtitle">${esc(subtitle)}</p>` : ''}
        <div class="article-byline">
          ${date ? `<span>${date}</span>` : ''}
          ${date && readTime ? `<span class="byline-sep">·</span>` : ''}
          ${readTime ? `<span>${readTime}</span>` : ''}
        </div>
      </div>

      <div class="article-body">${bodyHTML}</div>
    </div>`;

  // Re-highlight any code blocks marked.js may have left un-highlighted
  document.querySelectorAll('.article-body pre code:not(.hljs)').forEach(el => {
    hljs.highlightElement(el);
  });

  startProgress();
}

/* ════════════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════════════ */

configureMarked();
window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
